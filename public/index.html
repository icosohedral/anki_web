<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Anki web</title>
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <main class="page">
      <section class="panel hero">
        <p class="eyebrow">Anki web</p>
        <h1>Anki web</h1>
        <p id="hero-intro" class="intro"></p>
      </section>

      <section class="panel" id="setup-panel">
        <div class="section-title">
          <h2 id="setup-title"></h2>
          <span id="setup-step"></span>
        </div>

        <label class="field">
          <span id="target-language-label"></span>
          <select id="target-language-select"></select>
        </label>

        <label class="field hidden" id="custom-language-field">
          <span id="custom-language-label"></span>
          <input id="custom-language-input" type="text" />
        </label>

        <label class="field">
          <span id="materials-label"></span>
          <textarea id="materials-input" rows="10"></textarea>
        </label>

        <button id="start-button" class="primary-button"></button>
      </section>

      <section class="panel hidden" id="practice-panel">
        <div class="section-title">
          <h2 id="practice-title"></h2>
          <span id="progress-text">1 / 1</span>
        </div>

        <div class="prompt-card">
          <div class="prompt-header">
            <p id="prompt-label" class="prompt-label"></p>
            <button id="toggle-source-button" class="icon-button" type="button" aria-label="显示原文" aria-pressed="false">
              <svg class="eye-icon eye-icon-closed" viewBox="0 0 24 24" aria-hidden="true">
                <path d="M3 3l18 18" />
                <path d="M10.6 10.7a2 2 0 0 0 2.7 2.7" />
                <path d="M9.4 5.5A10.7 10.7 0 0 1 12 5c5 0 8.8 3.2 10 7-0.5 1.5-1.4 2.9-2.6 4" />
                <path d="M6.5 6.7C4.7 8 3.4 9.8 2 12c1.2 3.8 5 7 10 7 1.7 0 3.2-.4 4.6-1" />
              </svg>
              <svg class="eye-icon eye-icon-open hidden" viewBox="0 0 24 24" aria-hidden="true">
                <path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7Z" />
                <circle cx="12" cy="12" r="3" />
              </svg>
            </button>
          </div>
          <p id="translation-text" class="translation-text"></p>
          <p id="source-text" class="source-text hidden"></p>
        </div>

        <label class="field">
          <span class="field-spacer" aria-hidden="true">&nbsp;</span>
          <textarea id="answer-input" rows="4"></textarea>
        </label>

        <div class="actions">
          <button id="check-button" class="primary-button"></button>
          <button id="next-button" class="primary-button hidden"></button>
        </div>

        <section id="result-card" class="result-card hidden"></section>
      </section>

      <section class="panel hidden" id="summary-panel">
        <div class="section-title">
          <h2 id="summary-title"></h2>
          <span id="summary-step"></span>
        </div>

        <div class="summary-grid">
          <div class="summary-item">
            <p id="summary-total-label" class="summary-label"></p>
            <p id="summary-total" class="summary-value">0</p>
          </div>
          <div class="summary-item">
            <p id="summary-average-label" class="summary-label"></p>
            <p id="summary-average" class="summary-value">0</p>
          </div>
          <div class="summary-item">
            <p id="summary-perfect-label" class="summary-label"></p>
            <p id="summary-perfect" class="summary-value">0</p>
          </div>
        </div>

        <p id="summary-message" class="summary-message"></p>
        <div class="summary-actions">
          <button id="retry-wrong-button" class="primary-button hidden"></button>
          <button id="restart-button" class="primary-button"></button>
        </div>
      </section>
    </main>

    <button id="settings-toggle-button" class="settings-fab" type="button" aria-expanded="false" aria-controls="settings-panel">
      <svg viewBox="0 0 24 24" aria-hidden="true">
        <path d="M12 8.7A3.3 3.3 0 1 0 12 15.3A3.3 3.3 0 1 0 12 8.7Z" />
        <path d="M19.4 15a1 1 0 0 0 .2 1.1l.1.1a1.2 1.2 0 0 1 0 1.7l-1.6 1.6a1.2 1.2 0 0 1-1.7 0l-.1-.1a1 1 0 0 0-1.1-.2 1 1 0 0 0-.6.9V20a1.2 1.2 0 0 1-1.2 1.2h-2.2A1.2 1.2 0 0 1 10 20v-.2a1 1 0 0 0-.6-.9 1 1 0 0 0-1.1.2l-.1.1a1.2 1.2 0 0 1-1.7 0l-1.6-1.6a1.2 1.2 0 0 1 0-1.7l.1-.1a1 1 0 0 0 .2-1.1 1 1 0 0 0-.9-.6H4A1.2 1.2 0 0 1 2.8 13v-2.2A1.2 1.2 0 0 1 4 9.6h.2a1 1 0 0 0 .9-.6 1 1 0 0 0-.2-1.1l-.1-.1a1.2 1.2 0 0 1 0-1.7l1.6-1.6a1.2 1.2 0 0 1 1.7 0l.1.1a1 1 0 0 0 1.1.2 1 1 0 0 0 .6-.9V4A1.2 1.2 0 0 1 11.2 2.8h2.2A1.2 1.2 0 0 1 14.6 4v.2a1 1 0 0 0 .6.9 1 1 0 0 0 1.1-.2l.1-.1a1.2 1.2 0 0 1 1.7 0l1.6 1.6a1.2 1.2 0 0 1 0 1.7l-.1.1a1 1 0 0 0-.2 1.1 1 1 0 0 0 .9.6h.2A1.2 1.2 0 0 1 21.2 10.8V13a1.2 1.2 0 0 1-1.2 1.2h-.2a1 1 0 0 0-.9.8Z" />
      </svg>
    </button>

    <aside id="settings-panel" class="settings-panel hidden" aria-hidden="true">
      <div class="settings-header">
        <h3 id="settings-title"></h3>
        <button id="settings-close-button" class="settings-close-button" type="button" aria-label="Close">×</button>
      </div>

      <label class="field">
        <span id="ui-language-label"></span>
        <select id="ui-language-select">
          <option value="zh">简体中文</option>
          <option value="en">English</option>
          <option value="ja">日本語</option>
          <option value="fr">Français</option>
          <option value="es">Español</option>
        </select>
      </label>
    </aside>

    <script src="/app.js"></script>
  </body>
</html>
